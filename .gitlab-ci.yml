#     - echo $GHCR_TOKEN | docker login ghcr.io -u $GHCR_USER --password-stdin
#   script:
#     - docker build -t ghcr.io/$GHCR_USER/postcontrol:latest .
#     - docker push ghcr.io/$GHCR_USER/postcontrol:latest
